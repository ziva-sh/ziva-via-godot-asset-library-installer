# For syntax, see https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
# This workflow is automatically triggered for every push and pull request, to verify that everything still builds.

name: Continuous Integration
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  merge_group:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify addon structure
        run: |
          if [ ! -d "addons/ziva_installer" ]; then
            echo "Error: addons/ziva_installer directory not found"
            exit 1
          fi
          if [ ! -f "addons/ziva_installer/plugin.cfg" ]; then
            echo "Error: plugin.cfg not found"
            exit 1
          fi

      - name: Test packaging
        run: zip -r ziva_installer.zip addons/ziva_installer/
